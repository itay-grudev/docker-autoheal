name: build

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 0 * * *'

jobs:
  multi:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      -
        name: Checkout
        uses: actions/checkout@v7
      -
        name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      -
        name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v4

      -
        name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # -
      #   name: Login to DockerHub
      #   uses: docker/login-action@v1
      #   with:
      #     username: ${{ secrets.DOCKER_USERNAME }}
      #     password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Get latest Alpine Version
        id: get-alpine-version
        run: |
          ALPINE_VERSION=$(docker run --rm alpine:latest cat /etc/alpine-release | awk -F '.' '{ print $1"."$2 }')
          echo "ALPINE_VERSION=$ALPINE_VERSION" >> $GITHUB_ENV

      - if: github.ref == 'refs/heads/main'
        name: Conditional(Set tag as `latest`)
        run: |
          echo "tag=willfarrell/autoheal:latest" >> $GITHUB_ENV
          echo "ghcr_tag=ghcr.io/${{ github.repository }}:latest" >> $GITHUB_ENV

      - if: startsWith(github.ref, 'refs/tags/')
        name: Conditional(Set tag as `{version}`)
        run: |
          echo "tag=willfarrell/autoheal:${GITHUB_REF#refs/*/}" >> $GITHUB_ENV
          echo "ghcr_tag=ghcr.io/${{ github.repository }}:${GITHUB_REF#refs/*/}" >> $GITHUB_ENV
      -
        name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/386,linux/amd64,linux/arm/v6,linux/arm/v7,linux/arm64,linux/ppc64le
          build-args: |
            ALPINE_VERSION=${{ env.ALPINE_VERSION }}
          tags: ${{ env.tag }}

      - name: Test the docker image
        working-directory: ./tests
        env:
          AUTOHEAL_IMAGE: ${{ env.tag }}
        run: |
          ./tests.sh

      # - if: env.tag != ''
      #   name: Push to DockerHub
      #   continue-on-error: true
      #   run: |
      #     docker buildx imagetools create --tag ${{ env.tag }} ${{ env.tag }}

      - if: env.ghcr_tag != ''
        name: Push to GitHub Container Registry
        continue-on-error: true
        run: |
          docker buildx imagetools create --tag ${{ env.ghcr_tag }} ${{ env.tag }}
